name: Fairfax Building Permits - Weekly Update

on:
  # Runs weekly on Monday at 3 AM UTC (10 PM Sunday Eastern, 11 PM EDT)
  schedule:
    - cron: '0 3 * * 1'

  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Run full refresh instead of incremental'
        required: false
        default: 'false'
        type: boolean

# Prevent overlapping runs
concurrency:
  group: permits-etl
  cancel-in-progress: true

jobs:
  update-permits-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required for pushing commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow requests

      - name: Run permits ETL (incremental)
        if: ${{ github.event.inputs.full_refresh != 'true' }}
        run: |
          cd $GITHUB_WORKSPACE
          python multi-county-real-estate-research/scripts/fairfax_permits_etl.py --recent

      - name: Run permits ETL (full refresh)
        if: ${{ github.event.inputs.full_refresh == 'true' }}
        run: |
          cd $GITHUB_WORKSPACE
          python multi-county-real-estate-research/scripts/fairfax_permits_etl.py

      - name: Check for changes
        id: check_changes
        run: |
          git add -N multi-county-real-estate-research/data/fairfax/building_permits/processed/
          if git diff --quiet multi-county-real-estate-research/data/fairfax/building_permits/processed/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add multi-county-real-estate-research/data/fairfax/building_permits/processed/
          git commit -m "Auto-update: Fairfax building permits $(date '+%Y-%m-%d')"

          # Pull with rebase to handle any concurrent pushes, then push with retry
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $attempt failed, retrying in $((attempt * 2)) seconds..."
            sleep $((attempt * 2))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report status
        if: always()
        run: |
          METADATA_FILE="multi-county-real-estate-research/data/fairfax/building_permits/processed/metadata.json"
          if [ -f "$METADATA_FILE" ]; then
            echo "Building permits updated successfully"
            echo ""
            echo "=== Metadata ==="
            cat "$METADATA_FILE"
          else
            echo "No metadata file found - check if ETL completed"
          fi
